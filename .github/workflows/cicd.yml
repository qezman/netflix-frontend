name: Build and push FE image

on:
  push:
    branches: [main]

jobs:
  build-and-push-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: List installed packages
        run: npm list --depth=0

      - name: Build app
        run: npm run build

      - name: Check build
        run: ls -la build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: docker build -t netflix_frontend:latest .

      - name: Tag Docker image
        run: docker tag netflix_frontend:latest 663291012203.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/netflix_frontend:latest

      - name: Verify tagged image
        run: docker images

      - name: Push Docker image
        run: docker push 663291012203.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/netflix_frontend:latest
